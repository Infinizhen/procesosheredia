<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Default fallback metadata for crawlers that do NOT execute JavaScript —
      chiefly social-media link scrapers (Facebook, X, WhatsApp), which read the
      Open Graph tags below. JS-capable crawlers (e.g. Googlebot) instead receive
      richer, per-language metadata injected at runtime by <Seo> (React 19
      document metadata): the localized title, meta description, canonical +
      hreflang and MusicGroup JSON-LD. The meta description is deliberately left
      to <Seo> so a single, correct-language description is served per page.
    -->
    <title>Antonio Procesos Heredia — Official site</title>

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Antonio Procesos Heredia" />
    <meta property="og:title" content="Antonio Procesos Heredia" />
    <meta
      property="og:description"
      content="Official site of the musician Antonio Procesos Heredia."
    />
    <meta property="og:url" content="https://procesosheredia.com/" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
