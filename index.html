<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Default fallback metadata for crawlers that do NOT execute JavaScript —
      chiefly social-media link scrapers (Facebook, X, WhatsApp), which read the
      Open Graph tags below. JS-capable crawlers (e.g. Googlebot) instead receive
      richer, per-language metadata injected at runtime by Seo (React 19 document
      metadata): meta description, canonical + hreflang and MusicGroup JSON-LD.
      The meta description is left to Seo.

      The title element below is the single canonical one — kept for valid HTML
      and a sensible default before JS loads / for no-JS clients. Seo updates it
      per page in place (document.title), so a second one is never added.
    -->
    <title>Antonio Procesos Heredia — Official site</title>

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Antonio Procesos Heredia" />
    <meta property="og:title" content="Antonio Procesos Heredia" />
    <meta
      property="og:description"
      content="Official site of the musician Antonio Procesos Heredia."
    />
    <meta property="og:url" content="https://procesosheredia.com/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://procesosheredia.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Antonio Procesos Heredia" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://procesosheredia.com/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
